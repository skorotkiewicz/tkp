[book]
authors = ["antigravity"]
language = "en"
src = "src"
title = "TKP (Toki Pona) Programming Language"
description = "Documentation for the TKP programming language — Toki Pona keywords, Rust implementation"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/your-username/tkp"
edit-url-template = "https://github.com/your-username/tkp/edit/main/docs/src/{path}"
