<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TKP (Toki Pona) Playground</title>
  <style>
    :root {
      --bg-color: #0b0e14;
      --panel-bg: rgba(22, 27, 34, 0.7);
      --border-color: #30363d;
      --accent-color: #f7e018; /* Toki Pona yellow */
      --text-color: #c9d1d9;
      --heading-color: #f0f6fc;
      --error-color: #f85149;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 1rem 1.5rem;
      background: rgba(13, 17, 23, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 10;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--heading-color);
      letter-spacing: -0.5px;
    }

    header span.tagline {
      font-size: 0.875rem;
      color: #8b949e;
    }

    .badge {
      font-size: 0.75rem;
      background: var(--accent-color);
      color: #000;
      padding: 0.125rem 0.5rem;
      border-radius: 20px;
      font-weight: 600;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 1rem;
      font-size: 0.875rem;
    }

    .nav-links a {
      color: #58a6ff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #79c0ff;
      text-decoration: underline;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      overflow: hidden;
    }

    .panel-header {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #8b949e;
      background: #161b22;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #editor {
      flex: 1;
      overflow: auto;
      background: #0d1117;
    }

    .cm-editor {
      height: 100%;
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace !important;
      font-size: 14px !important;
    }

    .cm-editor.cm-focused { outline: none; }
    .cm-content { padding: 1.5rem !important; }
    .cm-gutters { background: #0d1117 !important; border-right: 1px solid var(--border-color) !important; color: #484f58 !important; }

    #output {
      flex: 1;
      background: #010409;
      color: #56d364;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 1.5rem;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
    }

    #output.error { color: var(--error-color); }
    #output.waiting { color: #8b949e; font-style: italic; }

    .run-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 0.375rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }

    .run-btn:hover { background: #2ea043; }
    .run-btn:active { transform: translateY(1px); }
    .run-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    .examples {
      padding: 0.75rem 1rem;
      background: #161b22;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .example-btn {
      font-size: 0.75rem;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-btn:hover { color: var(--heading-color); border-color: #6e7681; background: #21262d; }
  </style>
</head>
<body>

<header>
  <h1>TKP <span style="color:#8b949e">Toki Pona</span></h1>
  <span class="badge">v0.1.1</span>
  <span class="tagline">Minimalist Programming Simplicity</span>
  <nav class="nav-links">
    <a href="https://github.com/skorotkiewicz/tkp">GitHub</a>
    <a href="/docs/introduction.html">Docs</a>
  </nav>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span>nasin pali (Code Editor)</span>
      <button class="run-btn" id="runBtn" onclick="runCode()" disabled>▶ pali (Run)</button>
    </div>
    <div id="editor"></div>
    <div class="examples">
      <button class="example-btn" onclick="loadExample('toki')">toki</button>
      <button class="example-btn" onclick="loadExample('fibonacci')">fibonacci</button>
      <button class="example-btn" onclick="loadExample('add')">add</button>
      <button class="example-btn" onclick="loadExample('sin')">sin loop</button>
      <button class="example-btn" onclick="loadExample('struct')">kulupu (struct)</button>
      <button class="example-btn" onclick="loadExample('match')">sama (match)</button>
    </div>
  </div>

  <div class="panel" style="border-right:none">
    <div class="panel-header">
      <span>nasin toki (Output)</span>
    </div>
    <div id="output" class="waiting">nasin pi pana toki li awen... (Press Run to execute)</div>
  </div>
</div>

<script type="module">
  import { defaultKeymap, indentWithTab } from 'https://esm.sh/@codemirror/commands@6';
  import { HighlightStyle, StreamLanguage, syntaxHighlighting } from 'https://esm.sh/@codemirror/language@6';
  import { EditorState } from 'https://esm.sh/@codemirror/state@6';
  import { EditorView, highlightActiveLine, keymap, lineNumbers } from 'https://esm.sh/@codemirror/view@6';
  import { tags } from 'https://esm.sh/@lezer/highlight@1';
  import init, { run_tkp } from './tkp.js';

  const KEYWORDS = ['pali','pana','ijo','awen','la','ante','sin','lon','pini','tawa','kulupu','lukin','alasa','sama','jo','ken','nanpa','insa'];
  const TYPES    = ['nanpa_kind','kipisi','sitelen','lawa','weka'];
  const BUILTINS = ['toki','kute','lili_nanpa','wawa_nanpa','suli_nanpa','nanpa_ante','kipisi_ante','suli_ijo','lipu_lukin','lipu_sitelen','lipu_sin','lipu_lon','sitelen_pali','toki_pakala', 'nasin','lape','lawa_pali','toki_ijo','tenpo_ni','suno_ni','nanpa_tenpo','nasin_alasa','nasin_sama','nasin_ante','lipu_lukin_http','tawa_pana','kulupu_lukin','kulupu_pali','kulupu_pona'];
  const ATOMS    = ['kin','ala','weka'];

  const tkpLang = StreamLanguage.define({
    token(stream) {
      if (stream.match('//')) { stream.skipToEnd(); return 'lineComment'; }
      if (stream.peek() === '"') {
        stream.next();
        while (!stream.eol()) { if (stream.next() === '"') break; }
        return 'string';
      }
      if (stream.match(/\d+(\.\d+)?/)) return 'number';
      if (stream.match(/[\w_]+/)) {
        const w = stream.current();
        if (KEYWORDS.includes(w)) return 'keyword';
        if (TYPES.includes(w))    return 'typeName';
        if (BUILTINS.includes(w)) return 'function';
        if (ATOMS.includes(w))    return 'atom';
        return 'variableName';
      }
      stream.next();
      return null;
    }
  });

  const tkpTheme = HighlightStyle.define([
    { tag: tags.keyword,       color: '#ff7b72' },
    { tag: tags.typeName,      color: '#ffa657' },
    { tag: tags.function(tags.variableName), color: '#d2a8ff' },
    { tag: tags.atom,          color: '#79c0ff' },
    { tag: tags.string,        color: '#a5d6ff' },
    { tag: tags.number,        color: '#79c0ff' },
    { tag: tags.lineComment,   color: '#8b949e', fontStyle: 'italic' },
    { tag: tags.variableName,  color: '#c9d1d9' },
  ]);

  const editorTheme = EditorView.theme({
    '&': { background: '#0d1117', color: '#c9d1d9', height: '100%' },
    '.cm-content': { caretColor: '#c9d1d9' },
    '.cm-selectionBackground, ::selection': { background: '#264f78 !important' },
  }, { dark: true });

  const EXAMPLES = {
    toki: `toki("toki a! ni li toki pona.")
toki("mi wile pali e pona.")`,

    fibonacci: `pali fib(n: nanpa_kind) -> nanpa_kind {
    la n <= 1 {
        pana n
    }
    pana fib(n - 1) + fib(n - 2)
}

toki(fib(10)) // 55`,

    add: `pali add(a: nanpa_kind, b: nanpa_kind) -> nanpa_kind {
    pana a + b
}

ijo x = 10
ijo y = 20
toki(add(x, y))`,

    sin: `sin ijo i = 1; i <= 10; i += 1 {
    la i % 2 == 0 {
        toki(sitelen_pali("{0} li nanpa pona", i))
    } ante {
        toki(sitelen_pali("{0} li nanpa lili", i))
    }
}`,

    struct: `kulupu jan {
    nimi: sitelen,
    tenpo: nanpa_kind
}

ken jan {
    pali toki_insa(mi: jan) {
        toki(sitelen_pali("nimi mi li {0}. tenpo mi li {1}.", mi.nimi, mi.tenpo))
    }
}

ijo m = jan { nimi: "Pali", tenpo: 20 }
m.toki_insa()`,

    match: `ijo s = "pona"

sama s {
    "pona" => toki("lo! ni li pona.")
    "ike"  => toki("ike a...")
    _      => toki("mi sona ala.")
}`
  };

  const initialCode = `toki("toki a, ma o!")
toki("ni li toki pona.")`;

  const view = new EditorView({
    state: EditorState.create({
      doc: initialCode,
      extensions: [
        lineNumbers(),
        highlightActiveLine(),
        tkpLang,
        syntaxHighlighting(tkpTheme),
        editorTheme,
        keymap.of([...defaultKeymap, indentWithTab]),
        EditorView.lineWrapping,
      ]
    }),
    parent: document.getElementById('editor')
  });

  let wasmReady = false;

  async function initWasm() {
    try {
      await init();
      wasmReady = true;
      document.getElementById('runBtn').disabled = false;
    } catch (e) {
      console.error("WASM init failed:", e);
      document.getElementById('output').textContent = "Failed to load WASM engine.";
    }
  }

  window.runCode = () => {
    if (!wasmReady) return;
    const code = view.state.doc.toString();
    const out = document.getElementById('output');
    out.className = '';
    
    try {
      const result = run_tkp(code);
      if (result.includes('[Runtime Error]') || result.includes('[Parse Error]') || result.includes('[Type Warning]')) {
        out.className = 'error';
      }
      out.textContent = result || '(No output)';
    } catch (e) {
      out.className = 'error';
      out.textContent = "Execution error: " + e;
    }
  };

  window.loadExample = (name) => {
    view.dispatch({
      changes: { from: 0, to: view.state.doc.length, insert: EXAMPLES[name] }
    });
  };

  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      window.runCode();
    }
  });

  initWasm();
</script>

</body>
</html>
